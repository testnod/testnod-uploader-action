name: "TestNod Uploader"
description: "Upload JUnit XML test results to TestNod for tracking, flaky test detection, and alerting."
branding:
  icon: "upload-cloud"
  color: "blue"

inputs:
  token:
    description: "TestNod API token for authentication."
    required: true
  file:
    description: "Path to the JUnit XML file to upload. Required unless finalize=only."
    required: false
    default: ""
  tags:
    description: "Comma-separated list of tags to attach to the upload."
    required: false
    default: ""
  ignore-failures:
    description: "If true, the action will not fail the workflow when the upload encounters an error."
    required: false
    default: "false"
  uploader-version:
    description: "Version of the TestNod uploader binary to download. Defaults to 'latest'."
    required: false
    default: "latest"
  build-id:
    description: "Build identifier used to group parallel/matrix shards into one logical test run. Defaults to github.run_id."
    required: false
    default: ""
  finalize:
    description: "When to call TestNod's finalize endpoint. 'true' (default) uploads then finalizes — right for single-job workflows. 'false' uploads only — use on per-shard steps in a matrix. 'only' skips upload and just finalizes — use in a separate aggregate job that runs after all matrix shards complete."
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Check test results file
      id: check-file
      if: inputs.finalize != 'only' && inputs.file != ''
      shell: bash
      env:
        TESTNOD_FILE: ${{ inputs.file }}
      run: |
        if [ ! -f "$TESTNOD_FILE" ]; then
          echo "::warning::Test results file '$TESTNOD_FILE' not found — skipping TestNod upload. This usually means a step before the tests failed."
          echo "skip=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Determine platform and architecture
      id: platform
      if: inputs.finalize != 'only' && steps.check-file.outputs.skip != 'true'
      shell: bash
      run: |
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)

        case "$OS" in
          linux)  PLATFORM="linux" ;;
          darwin) PLATFORM="darwin" ;;
          mingw*|msys*|cygwin*) PLATFORM="windows" ;;
          *)
            echo "::error::Unsupported OS: $OS"
            exit 1
            ;;
        esac

        case "$ARCH" in
          x86_64|amd64)  ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
          *)
            echo "::error::Unsupported architecture: $ARCH"
            exit 1
            ;;
        esac

        EXTENSION=""
        if [ "$PLATFORM" = "windows" ]; then
          EXTENSION=".exe"
        fi

        BINARY_NAME="testnod-uploader-${PLATFORM}-${ARCH}${EXTENSION}"

        echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
        echo "arch=$ARCH" >> "$GITHUB_OUTPUT"
        echo "extension=$EXTENSION" >> "$GITHUB_OUTPUT"
        echo "binary-name=$BINARY_NAME" >> "$GITHUB_OUTPUT"

    - name: Restore cached binary
      if: inputs.finalize != 'only' && inputs.uploader-version != 'latest' && steps.check-file.outputs.skip != 'true'
      id: cache
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/testnod-uploader
        key: testnod-uploader-${{ inputs.uploader-version }}-${{ steps.platform.outputs.platform }}-${{ steps.platform.outputs.arch }}

    - name: Download TestNod uploader
      if: inputs.finalize != 'only' && (inputs.uploader-version == 'latest' || steps.cache.outputs.cache-hit != 'true') && steps.check-file.outputs.skip != 'true'
      shell: bash
      env:
        UPLOADER_VERSION: ${{ inputs.uploader-version }}
        BINARY_NAME: ${{ steps.platform.outputs.binary-name }}
      run: |
        DOWNLOAD_URL="https://releases.testnod.com/testnod-uploader/${UPLOADER_VERSION}/${BINARY_NAME}"
        DEST_DIR="${RUNNER_TEMP}/testnod-uploader"

        mkdir -p "$DEST_DIR"

        echo "Downloading TestNod uploader from ${DOWNLOAD_URL}"
        curl -fsSL --retry 3 --retry-delay 5 -o "${DEST_DIR}/${BINARY_NAME}" "$DOWNLOAD_URL"
        chmod +x "${DEST_DIR}/${BINARY_NAME}"

    - name: Run TestNod uploader
      if: steps.check-file.outputs.skip != 'true'
      shell: bash
      env:
        TESTNOD_TOKEN: ${{ inputs.token }}
        TESTNOD_FILE: ${{ inputs.file }}
        TESTNOD_TAGS: ${{ inputs.tags }}
        TESTNOD_IGNORE_FAILURES: ${{ inputs.ignore-failures }}
        BUILD_ID_INPUT: ${{ inputs.build-id }}
        FINALIZE_MODE: ${{ inputs.finalize }}
        BINARY_NAME: ${{ steps.platform.outputs.binary-name }}
        BRANCH: ${{ github.head_ref || github.ref_name }}
        COMMIT_SHA: ${{ github.sha }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        case "$FINALIZE_MODE" in
          true|false|only) ;;
          *)
            echo "::error::Invalid 'finalize' value: '${FINALIZE_MODE}'. Must be 'true', 'false', or 'only'."
            exit 1
            ;;
        esac

        EFFECTIVE_BUILD_ID="${BUILD_ID_INPUT:-$GITHUB_RUN_ID}"

        if [ "$FINALIZE_MODE" != "only" ]; then
          if [ -z "$TESTNOD_FILE" ]; then
            echo "::error::'file' input is required unless finalize=only."
            exit 1
          fi

          BINARY_PATH="${RUNNER_TEMP}/testnod-uploader/${BINARY_NAME}"

          ARGS=(
            -token="$TESTNOD_TOKEN"
            -branch="$BRANCH"
            -commit-sha="$COMMIT_SHA"
            -run-url="$RUN_URL"
            -build-id="$EFFECTIVE_BUILD_ID"
          )

          # Split comma-separated tags into individual -tag flags
          if [ -n "$TESTNOD_TAGS" ]; then
            IFS=',' read -ra TAG_ARRAY <<< "$TESTNOD_TAGS"
            for tag in "${TAG_ARRAY[@]}"; do
              tag=$(echo "$tag" | xargs)  # trim whitespace
              if [ -n "$tag" ]; then
                ARGS+=(-tag="$tag")
              fi
            done
          fi

          if [ "$TESTNOD_IGNORE_FAILURES" = "true" ]; then
            ARGS+=(-ignore-failures)
          fi

          # File path is a positional argument, not a flag
          ARGS+=("$TESTNOD_FILE")

          echo "Running TestNod uploader..."
          "$BINARY_PATH" "${ARGS[@]}"
        fi

        if [ "$FINALIZE_MODE" = "true" ] || [ "$FINALIZE_MODE" = "only" ]; then
          BASE_URL="${TESTNOD_BASE_URL:-https://testnod.com}"
          echo "Finalizing TestNod test run for build ${EFFECTIVE_BUILD_ID}..."

          HTTP_CODE=$(curl -sS -o /tmp/testnod-finalize.body -w "%{http_code}" \
            --retry 3 --retry-delay 2 --retry-connrefused \
            -X POST "${BASE_URL}/integrations/test_runs/finalize" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -H "Project-Token: ${TESTNOD_TOKEN}" \
            -d "{\"build_id\":\"${EFFECTIVE_BUILD_ID}\"}")

          if [ "$HTTP_CODE" != "200" ]; then
            BODY=$(cat /tmp/testnod-finalize.body 2>/dev/null || true)
            echo "::warning::Finalize returned HTTP ${HTTP_CODE}: ${BODY}"
            if [ "$TESTNOD_IGNORE_FAILURES" != "true" ]; then
              exit 1
            fi
          else
            echo "Test run finalized."
          fi
        fi
